name: cidadealerta
description: Denúncias urbanas georreferenciadas — custo zero no MVP.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  firebase_analytics: ^11.2.1

  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Mapa
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^1.3.3

  # Localização
  geolocator: ^12.0.0
  geoflutterfire_plus: ^0.0.31

  # Câmera e imagem
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Navegação
  go_router: ^14.2.7

  # Utilitários
  cached_network_image: ^3.4.1
  uuid: ^4.4.2
  intl: ^0.19.0
  path_provider: ^2.1.3
  connectivity_plus: ^6.0.3
  hive_flutter: ^1.1.0
  crypto: ^3.0.3
  timeago: ^3.6.1
  shimmer: ^3.0.0
  fluttertoast: ^8.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
